<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Researcher Intelligence Hub | Responsive</title>
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --accent: #06b6d4;
    --bg: #0f172a;
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
    color: var(--text-main);
    min-height: 100vh;
    padding: 1rem; /* Reduced for mobile */
  }

  .container { max-width: 1100px; margin: 0 auto; }
  
  header { margin: 1.5rem 0 2rem; text-align: center; }
  header h1 { 
    font-size: clamp(24px, 8vw, 36px); /* Responsive font size */
    font-weight: 800; 
    background: linear-gradient(to right, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  /* Responsive Tabs */
  .tabs { 
    display: flex; 
    overflow-x: auto; /* Scrollable tabs on tiny screens */
    gap: 8px; 
    margin-bottom: 1.5rem;
    padding-bottom: 5px;
    -webkit-overflow-scrolling: touch;
  }
  
  .tab-btn {
    flex: 1; /* Equal width on mobile */
    min-width: 100px;
    padding: 10px 15px; 
    background: var(--glass); 
    border: 1px solid var(--glass-border);
    border-radius: 12px; 
    cursor: pointer; 
    font-size: 13px; 
    font-weight: 600; 
    color: var(--text-dim); 
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab-btn.active { 
    background: var(--primary); color: white; border-color: var(--primary);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }

  /* Content Cards */
  .tab-content {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 20px; padding: 1.5rem; 
    backdrop-filter: blur(20px); 
    display: none;
    animation: fadeIn 0.3s ease;
  }
  
  .tab-content.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Responsive Form Grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr; /* Stacked by default (Mobile) */
    gap: 1rem;
    margin-bottom: 1rem;
  }

  @media (min-width: 768px) {
    .form-grid { grid-template-columns: 1fr 1fr; } /* Side-by-side on Desktop */
    body { padding: 2rem; }
    .tab-content { padding: 2.5rem; }
  }

  .field { margin-bottom: 1rem; }
  label { font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; display: block; }
  
  select, textarea {
    width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--glass-border); border-radius: 12px;
    font-size: 16px; /* Prevents iOS zoom on focus */
    color: #fff; appearance: none;
  }
  
  .btn-primary { 
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; border: none; padding: 16px; border-radius: 12px; 
    font-weight: 700; cursor: pointer; width: 100%; font-size: 16px;
    margin-top: 0.5rem;
  }

  /* Results: Grid to Stack transition */
  .result-card { 
    margin-top: 20px; padding: 20px; border-radius: 16px; 
    background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
  }

  .comp-row { 
    display: flex;
    flex-direction: column; /* Stacked on Mobile */
    align-items: center; text-align: center; gap: 15px;
  }
  
  @media (min-width: 600px) {
    .comp-row { flex-direction: row; justify-content: space-between; } /* Horizontal on Tablet+ */
  }
  
  .val { font-size: 22px; font-weight: 800; color: #fff; }
  .tag { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .divider { font-size: 18px; color: var(--glass-border); font-weight: bold; }
  @media (max-width: 600px) { .divider { transform: rotate(90deg); margin: 5px 0; } }

  .strategy-list { padding-left: 0; list-style: none; }
  .strategy-list li { 
    background: rgba(0,0,0,0.2); margin-bottom: 10px; padding: 12px; 
    border-radius: 10px; border-left: 3px solid var(--accent); font-size: 14px;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Researcher Hub</h1>
    <p style="color: var(--text-dim); font-size: 13px;">Intelligence on the go</p>
  </header>

  <div class="tabs">
    <div class="tab-btn active" onclick="openTab(event, 'tab-leveling')">1:1 Leveling</div>
    <div class="tab-btn" onclick="openTab(event, 'tab-sourcing')">Sourcing</div>
    <div class="tab-btn" onclick="openTab(event, 'tab-outreach')">Strategy</div>
  </div>

  <!-- LEVELING TAB -->
  <div id="tab-leveling" class="tab-content active">
    <div class="form-grid">
      <div class="field">
        <label>Industry</label>
        <select id="industrySelector" onchange="populateCompanies()">
          <option value="">Select—</option>
          <option value="tech">Big Tech</option>
          <option value="consulting">Consulting</option>
          <option value="finance">Finance</option>
          <option value="enterprise">Fortune 500</option>
        </select>
      </div>
      <div class="field">
        <label>Company</label>
        <select id="compA" onchange="updateLevels()"><option value="">Select industry—</option></select>
      </div>
    </div>
    <div class="field">
        <label>Current Level</label>
        <select id="levelA" onchange="calculateMapping()"><option value="">Select company—</option></select>
    </div>

    <div id="level-result" class="result-card" style="display:none;">
        <div class="comp-row">
            <div><div class="tag" id="res-name-a">Current</div><div class="val" id="res-val-a">-</div></div>
            <div class="divider">⇄</div>
            <div><div class="tag">Equiv</div><div class="val" id="res-val-b">-</div></div>
            <div class="divider">→</div>
            <div><div class="tag" style="color:var(--accent)">Meta Target</div><div class="val" id="res-val-meta" style="color: var(--accent);">-</div></div>
        </div>
    </div>
  </div>

  <!-- SOURCING TAB -->
  <div id="tab-sourcing" class="tab-content">
    <div class="field">
        <label>JD Snippet</label>
        <textarea id="jd-input" rows="4" placeholder="Paste JD keywords..."></textarea>
    </div>
    <button class="btn-primary" onclick="runSourcing()">Analyze Market</button>
    <div id="sourcing-result" class="result-card" style="display:none;">
        <div id="sourcing-content"></div>
    </div>
  </div>

  <!-- STRATEGY TAB -->
  <div id="tab-outreach" class="tab-content">
    <div class="field">
        <label>Candidate Profile</label>
        <textarea id="profile-snippet" rows="4" placeholder="Paste LinkedIn summary..."></textarea>
    </div>
    <button class="btn-primary" onclick="generateStrategy()">Get Hooks</button>
    <div id="outreach-result" class="result-card" style="display:none;">
        <ul id="strategy-list" class="strategy-list"></ul>
    </div>
  </div>

</div>

<script>
const industries = {
  tech: {
    "Google": ["L3","L4","L5 (Sr)","L6 (Staff)","L7 (Prin)","L8 (Dir)"],
    "Amazon": ["L4","L5","L6 (Sr)","L7 (Prin)","L8 (Dir)","L10"],
    "Meta": ["IC3","IC4","IC5","IC6","IC7","IC8"]
  },
  consulting: {
    "McKinsey": ["Associate","EM","Assoc Partner","Partner","Sr Partner","Director"],
    "BCG": ["Consultant","Project Lead","Principal","Partner","MD","Sr Partner"]
  },
  finance: {
    "Goldman Sachs": ["Analyst","Associate","VP","Exec Director","MD","Partner"],
    "JP Morgan": ["Analyst","Associate","VP","Exec Director","MD","MD+"]
  },
  enterprise: {
    "General": ["Analyst","Manager","Sr Manager","Director","Sr Director","VP"]
  }
};

const metaMap = ["IC3", "IC4", "IC5", "IC6", "IC7", "IC8"];
const globalStandard = ["Associate", "Mid-Level", "Senior", "Lead", "Principal", "Director"];

function openTab(evt, tabId) {
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  evt.currentTarget.classList.add("active");
}

function populateCompanies() {
  const ind = document.getElementById("industrySelector").value;
  const compSel = document.getElementById("compA");
  compSel.innerHTML = '<option value="">Select—</option>';
  if(industries[ind]) {
    Object.keys(industries[ind]).forEach(c => {
      let opt = document.createElement("option");
      opt.value = c; opt.textContent = c;
      compSel.appendChild(opt);
    });
  }
}

function updateLevels() {
  const ind = document.getElementById("industrySelector").value;
  const co = document.getElementById("compA").value;
  const levSel = document.getElementById("levelA");
  levSel.innerHTML = '<option value="">Select—</option>';
  if(industries[ind] && industries[ind][co]) {
    industries[ind][co].forEach((l, i) => {
      let opt = document.createElement("option");
      opt.value = i; opt.textContent = l;
      levSel.appendChild(opt);
    });
  }
}

function calculateMapping() {
    const idx = parseInt(document.getElementById("levelA").value);
    const co = document.getElementById("compA").value;
    if (isNaN(idx)) return;
    
    document.getElementById("level-result").style.display = "block";
    document.getElementById("res-name-a").innerText = co;
    document.getElementById("res-val-a").innerText = industries[document.getElementById("industrySelector").value][co][idx];
    document.getElementById("res-val-b").innerText = globalStandard[idx];
    document.getElementById("res-val-meta").innerText = metaMap[idx];
}

function runSourcing() {
    document.getElementById("sourcing-result").style.display = "block";
    document.getElementById("sourcing-content").innerHTML = "<p style='color:var(--accent)'>✔ Best Fit: <b>Big Tech Lateral</b></p><p style='font-size:12px; margin-top:5px;'>Recommended: Look for 'Senior' titles at Tier 2 firms.</p>";
}

function generateStrategy() {
    document.getElementById("outreach-result").style.display = "block";
    document.getElementById("strategy-list").innerHTML = "<li>Connect on their specific product impact.</li><li>Mention Meta's culture of ownership.</li>";
}
</script>
</body>
</html>
