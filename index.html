<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Researcher Hub | Global Leveling</title>
<style>
  :root {
    --bg: #0a0a0b;
    --card-bg: #141416;
    --primary: #e5e5e1; 
    --secondary: #27272a; 
    --accent: #d4d4d8; 
    --text-main: #f4f4f5;
    --text-dim: #71717a;
    --border: #262626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    min-height: 100vh;
    padding: 1.5rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 800px; margin: 0 auto; }
  
  header { margin: 2rem 0 3rem; text-align: left; border-left: 1px solid var(--primary); padding-left: 1.5rem; }
  header h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.05em; color: var(--primary); }
  header p { color: var(--text-dim); font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.1em; }

  .tabs { 
    display: flex; gap: 8px; margin-bottom: 2rem; padding: 4px;
    background: var(--card-bg); border-radius: 14px; border: 1px solid var(--border);
  }
  
  .tab-btn {
    flex: 1; padding: 10px; background: transparent; border: none;
    border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 500; 
    color: var(--text-dim); transition: 0.2s;
  }

  .tab-btn.active { background: var(--secondary); color: var(--primary); }

  .tab-content {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 24px; padding: 2rem; display: none;
    box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7);
  }
  
  .tab-content.active { display: block; }

  .field { margin-bottom: 1.5rem; }
  label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; display: block; text-transform: uppercase; }
  
  select, textarea {
    width: 100%; padding: 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 12px;
    font-size: 16px; color: var(--text-main);
  }
  
  .btn-primary { 
    background: var(--primary); color: var(--bg); border: none; 
    padding: 16px; border-radius: 12px; font-weight: 600; 
    cursor: pointer; width: 100%; font-size: 15px;
  }

  .result-card { 
    margin-top: 2rem; padding: 24px; border-radius: 16px; 
    background: linear-gradient(145deg, #18181b, #141416);
    border: 1px solid var(--border);
  }

  .comp-row { 
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px;
  }
  
  @media (min-width: 600px) { .comp-row { flex-direction: row; justify-content: space-around; } }
  
  .val { font-size: 22px; font-weight: 600; color: var(--primary); }
  .tag { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  .divider { color: var(--border); font-size: 20px; }
  .strategy-list li { 
    background: var(--bg); margin-bottom: 12px; padding: 16px; border-radius: 12px; 
    border: 1px solid var(--border); font-size: 14px; color: var(--accent);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Intelligence Hub</h1>
    <p>Global Talent Calibration Engine</p>
  </header>

  <div class="tabs">
    <div class="tab-btn active" onclick="openTab(event, 'tab-leveling')">1:1 Leveling</div>
    <div class="tab-btn" onclick="openTab(event, 'tab-sourcing')">Sourcing</div>
    <div class="tab-btn" onclick="openTab(event, 'tab-outreach')">Strategy</div>
  </div>

  <!-- LEVELING TAB -->
  <div id="tab-leveling" class="tab-content active">
    <div class="field">
      <label>Company / Organization</label>
      <select id="compA" onchange="updateLevels()">
        <option value="">Select Company—</option>
      </select>
    </div>
    <div class="field">
        <label>Reported Seniority</label>
        <select id="levelA" onchange="calculateMapping()"><option value="">Select company first—</option></select>
    </div>

    <div id="level-result" class="result-card" style="display:none;">
        <div class="comp-row">
            <div><div class="tag" id="res-name-a">Source</div><div class="val" id="res-val-a">-</div></div>
            <div class="divider">/</div>
            <div><div class="tag">Internal Match</div><div class="val" id="res-val-meta" style="color: #fff; text-decoration: underline; text-underline-offset: 4px;">-</div></div>
        </div>
    </div>
  </div>

  <!-- SOURCING TAB -->
  <div id="tab-sourcing" class="tab-content">
    <div class="field">
        <label>Competency Matrix / JD</label>
        <textarea id="jd-input" rows="4" placeholder="Paste JD or skills..."></textarea>
    </div>
    <button class="btn-primary" onclick="runSourcing()">Analyze Market Pools</button>
    <div id="sourcing-result" class="result-card" style="display:none;">
        <div id="sourcing-content" style="font-size: 14px; line-height: 1.6;"></div>
    </div>
  </div>

  <!-- STRATEGY TAB -->
  <div id="tab-outreach" class="tab-content">
    <div class="field">
        <label>Candidate Profile Signals</label>
        <textarea id="profile-snippet" rows="4" placeholder="Brief background signals..."></textarea>
    </div>
    <button class="btn-primary" onclick="generateStrategy()">Synthesize Hooks</button>
    <div id="outreach-result" class="result-card" style="display:none;">
        <ul id="strategy-list" class="strategy-list"></ul>
    </div>
  </div>

</div>

<script>
const levelMap = {
  "Google": ["APM","PM II","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Apple": ["New Grad PM","PM","Senior PM","Lead PM","Principal PM","Director of PM","VP of Product"],
  "Amazon": ["PM I","PM II","Senior PM","Principal PM","Sr. Principal PM","Director of PM","VP of Product"],
  "Microsoft": ["PM","PM II","Senior PM","Principal PM","Group PM","Director of PM","CVP / VP"],
  "Salesforce": ["Associate PM","PM","Senior PM","Lead PM","Principal PM","Director of PM","VP of Product"],
  "Uber": ["APM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Airbnb": ["New Grad PM","PM","Senior PM","Staff PM","Director of PM","VP of Product","CPO"],
  "Stripe": ["PM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "LinkedIn": ["APM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Netflix": ["PM","PM","Senior PM","Senior PM","Director of PM","VP of Product","VP of Product"],
  "Twitter / X": ["PM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Snap": ["APM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "ByteDance / TikTok": ["PM","PM","Senior PM","Senior PM","PM Lead","Director of PM","VP of Product"],
  "PwC": ["Associate","Senior Associate","Manager","Senior Manager","Director","Managing Director","Partner"],
  "Deloitte": ["Analyst","Consultant","Senior Consultant","Manager","Senior Manager","Director","Partner"],
  "McKinsey": ["Business Analyst","Associate","Engagement Manager","Associate Principal","Principal","Partner","Senior Partner"],
  "Accenture": ["Analyst","Consultant","Senior Consultant","Manager","Senior Manager","Associate Director","Managing Director"],
  "JPMorgan": ["Analyst","Associate","VP","Executive Director","Managing Director","Partner","Managing Director"],
  "Goldman Sachs": ["Analyst","Associate","VP","Executive Director","Managing Director","Partner","Partner"],
  "Other (large tech)": ["Junior PM","PM","Senior PM","Staff PM","Group PM","Director of PM","VP of Product"],
  "Other (consulting / finance)": ["Analyst","Associate / Consultant","Manager","Senior Manager","Director","Managing Director","Partner / VP"],
  "Other (startup / mid-size)": ["PM","PM","Senior PM","Senior PM / PM Lead","Head of Product","Director of PM","VP / CPO"]
};

// Internal Meta Target Mapping
const metaLevels = ["IC3", "IC4", "IC5", "IC6", "IC7", "D1", "D2/VP"];

function init() {
  const compSel = document.getElementById("compA");
  Object.keys(levelMap).sort().forEach(c => {
    let opt = document.createElement("option");
    opt.value = c; opt.textContent = c;
    compSel.appendChild(opt);
  });
}

function openTab(evt, tabId) {
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
  evt.currentTarget.classList.add("active");
}

function updateLevels() {
  const co = document.getElementById("compA").value;
  const levSel = document.getElementById("levelA");
  levSel.innerHTML = '<option value="">Select Level—</option>';
  if(levelMap[co]) {
    levelMap[co].forEach((l, i) => {
      let opt = document.createElement("option");
      opt.value = i; opt.textContent = l;
      levSel.appendChild(opt);
    });
  }
}

function calculateMapping() {
    const idx = parseInt(document.getElementById("levelA").value);
    const co = document.getElementById("compA").value;
    if (isNaN(idx)) return;
    
    document.getElementById("level-result").style.display = "block";
    document.getElementById("res-name-a").innerText = co;
    document.getElementById("res-val-a").innerText = levelMap[co][idx];
    
    // Logic: Map the index of the source list to the Meta Level list
    // If source index is higher than Meta list, default to highest D2+
    document.getElementById("res-val-meta").innerText = metaLevels[idx] || "D2+ / VP";
}

function runSourcing() {
    document.getElementById("sourcing-result").style.display = "block";
    document.getElementById("sourcing-content").innerHTML = "Targeting <b>High-Intensity Tech</b> and <b>Top-Tier Professional Services</b>. <br>Look for 'Lateral Pivot' signals in tenure.";
}

function generateStrategy() {
    document.getElementById("outreach-result").style.display = "block";
    document.getElementById("strategy-list").innerHTML = "<li>Frame the role as 'Ownership of Scale'.</li><li>Mention Meta's current flat-org efficiency.</li>";
}

init();
</script>
</body>
</html>
